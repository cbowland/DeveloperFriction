apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: developer-friction-survey-webhook
  labels:
    app: developer-friction-survey
spec:
  to:
    kind: Service
    name: el-developer-friction-survey-listener
    weight: 100
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
