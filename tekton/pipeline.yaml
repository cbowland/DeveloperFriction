apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: developer-friction-survey-deploy
  labels:
    app: developer-friction-survey
spec:
  params:
    - name: image
      type: string
      description: Fully qualified quay.io image reference (e.g. quay.io/myorg/developer-friction-survey:latest)
    - name: app-name
      type: string
      default: developer-friction-survey
      description: Application name used in OpenShift resources

  tasks:
    - name: deploy
      taskSpec:
        params:
          - name: IMAGE
            type: string
          - name: APP_NAME
            type: string
        steps:
          - name: apply-manifests
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              echo "Deploying $(params.APP_NAME) with image $(params.IMAGE)"

              cat <<EOF | oc apply -f -
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
                  app.kubernetes.io/name: $(params.APP_NAME)
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: $(params.APP_NAME)
                template:
                  metadata:
                    labels:
                      app: $(params.APP_NAME)
                      app.kubernetes.io/name: $(params.APP_NAME)
                  spec:
                    containers:
                      - name: survey
                        image: $(params.IMAGE)
                        imagePullPolicy: Always
                        ports:
                          - containerPort: 8080
                            protocol: TCP
                        env:
                          - name: PORT
                            value: "8080"
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 250m
                            memory: 256Mi
                        livenessProbe:
                          httpGet:
                            path: /
                            port: 8080
                          initialDelaySeconds: 5
                          periodSeconds: 10
                        readinessProbe:
                          httpGet:
                            path: /
                            port: 8080
                          initialDelaySeconds: 3
                          periodSeconds: 5
              ---
              apiVersion: v1
              kind: Service
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
              spec:
                selector:
                  app: $(params.APP_NAME)
                ports:
                  - port: 8080
                    targetPort: 8080
                    protocol: TCP
              ---
              apiVersion: route.openshift.io/v1
              kind: Route
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
              spec:
                to:
                  kind: Service
                  name: $(params.APP_NAME)
                  weight: 100
                port:
                  targetPort: 8080
                tls:
                  termination: edge
                  insecureEdgeTerminationPolicy: Redirect
              EOF

              echo "Waiting for rollout..."
              oc rollout status deployment/$(params.APP_NAME) --timeout=120s
              echo "Deployment complete"
      params:
        - name: IMAGE
          value: $(params.image)
        - name: APP_NAME
          value: $(params.app-name)
