apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: developer-friction-survey-build-deploy
  labels:
    app: developer-friction-survey
spec:
  params:
    - name: git-url
      type: string
      description: Git repository URL
    - name: git-revision
      type: string
      default: main
      description: Git branch or revision to build
    - name: image
      type: string
      default: quay.io/cbowland/developer-friction-survey
      description: Image name to build and push (without tag)
    - name: app-name
      type: string
      default: developer-friction-survey
      description: Application name for OpenShift resources

  workspaces:
    - name: source

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
        kind: ClusterTask
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source

    - name: build-push
      taskRef:
        name: buildah
        kind: ClusterTask
      runAfter:
        - git-clone
      params:
        - name: IMAGE
          value: $(params.image):$(tasks.git-clone.results.commit)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: source

    - name: tag-latest
      taskSpec:
        params:
          - name: SOURCE_IMAGE
            type: string
          - name: TARGET_IMAGE
            type: string
        steps:
          - name: tag
            image: registry.redhat.io/ubi9/skopeo:latest
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              skopeo copy --src-tls-verify=false --dest-tls-verify=false \
                "docker://$(params.SOURCE_IMAGE)" \
                "docker://$(params.TARGET_IMAGE)"
      runAfter:
        - build-push
      params:
        - name: SOURCE_IMAGE
          value: $(params.image):$(tasks.git-clone.results.commit)
        - name: TARGET_IMAGE
          value: $(params.image):latest

    - name: deploy
      runAfter:
        - tag-latest
      taskSpec:
        params:
          - name: IMAGE
            type: string
          - name: APP_NAME
            type: string
        steps:
          - name: apply-and-rollout
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              echo "Deploying $(params.APP_NAME) with image $(params.IMAGE)"

              cat <<EOF | oc apply -f -
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
                  app.kubernetes.io/name: $(params.APP_NAME)
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: $(params.APP_NAME)
                template:
                  metadata:
                    labels:
                      app: $(params.APP_NAME)
                      app.kubernetes.io/name: $(params.APP_NAME)
                  spec:
                    containers:
                      - name: survey
                        image: $(params.IMAGE)
                        imagePullPolicy: Always
                        ports:
                          - containerPort: 8080
                            protocol: TCP
                        env:
                          - name: PORT
                            value: "8080"
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 250m
                            memory: 256Mi
                        livenessProbe:
                          httpGet:
                            path: /
                            port: 8080
                          initialDelaySeconds: 5
                          periodSeconds: 10
                        readinessProbe:
                          httpGet:
                            path: /
                            port: 8080
                          initialDelaySeconds: 3
                          periodSeconds: 5
              ---
              apiVersion: v1
              kind: Service
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
              spec:
                selector:
                  app: $(params.APP_NAME)
                ports:
                  - port: 8080
                    targetPort: 8080
                    protocol: TCP
              ---
              apiVersion: route.openshift.io/v1
              kind: Route
              metadata:
                name: $(params.APP_NAME)
                labels:
                  app: $(params.APP_NAME)
              spec:
                to:
                  kind: Service
                  name: $(params.APP_NAME)
                  weight: 100
                port:
                  targetPort: 8080
                tls:
                  termination: edge
                  insecureEdgeTerminationPolicy: Redirect
              EOF

              oc rollout restart deployment/$(params.APP_NAME)
              echo "Waiting for rollout..."
              oc rollout status deployment/$(params.APP_NAME) --timeout=120s
              echo "Deployment complete"
      params:
        - name: IMAGE
          value: $(params.image):$(tasks.git-clone.results.commit)
        - name: APP_NAME
          value: $(params.app-name)
